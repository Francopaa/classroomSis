<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Classroom</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #000000; --surface: #0d0d0d;
            --border: rgba(255,255,255,0.1); --border-hover: rgba(255,255,255,0.3);
            --text: #ffffff; --text-muted: #555555; --text-soft: #999999;
            --radius: 2px;
        }
        body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
        .brand { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; color: #fff; text-decoration: none; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 3rem; }
        .brand span { color: var(--text-muted); }
        .card { width: 100%; max-width: 380px; background: var(--surface); border: 1px solid var(--border); padding: 2rem; }
        .card-title { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1.75rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.1em; text-transform: uppercase; }
        .form-input { width: 100%; background: #000; border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; color: #fff; font-family: 'Space Grotesk', sans-serif; font-size: 14px; outline: none; transition: border-color 0.15s; }
        .form-input:focus { border-color: rgba(255,255,255,0.5); }
        .btn { width: 100%; display: flex; align-items: center; justify-content: center; padding: 10px 20px; font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; cursor: pointer; border: none; letter-spacing: 0.08em; text-transform: uppercase; background: #fff; color: #000; transition: background 0.1s; margin-top: 0.5rem; }
        .btn:hover { background: #e0e0e0; }
        .alert { padding: 10px 14px; font-size: 12px; margin-bottom: 1.25rem; border: 1px solid var(--border); font-family: 'Space Mono', monospace; letter-spacing: 0.03em; }
        .alert-error { border-color: rgba(255,255,255,0.15); color: var(--text-soft); }
        .alert-success { border-color: rgba(255,255,255,0.3); color: #fff; }
        .footer-link { text-align: center; margin-top: 1.5rem; font-size: 12px; color: var(--text-muted); font-family: 'Space Mono', monospace; }
        .footer-link a { color: #fff; text-decoration: none; }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <a href="/" class="brand">class<span>/</span>room</a>
    <div class="card">
        <p class="card-title">Iniciar sesión</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label class="form-label">Correo</label>
                <input type="email" name="email" class="form-input" placeholder="tu@correo.com" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-input" placeholder="••••••" required>
            </div>
            <button type="submit" class="btn">Entrar</button>
        </form>
        <p class="footer-link">¿No tienes cuenta? <a href="/register">Crear cuenta</a></p>
    </div>
</body>
</html>
